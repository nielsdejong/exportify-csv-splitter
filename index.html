<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Spotify CSV Splitter</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 2em;
      background: #f9f9f9;
      color: #333;
    }
    h1 {
      font-size: 1.5em;
    }
    input[type="file"] {
      margin: 1em 0;
    }
    button {
      margin-top: 1em;
      padding: 0.5em 1em;
      cursor: pointer;
    }
    .downloads a {
      display: block;
      margin: 0.5em 0;
      text-decoration: none;
      color: #007acc;
    }
  </style>
</head>
<body>
  <h1>Split Exportify CSV for Neo4j Import</h1>
  <p>Step 1: Visit <a target="_blank" href="https://exportify.net/">Exportify</a> to export your songs. Next, upload your <code>liked_songs.csv</code> (or other playlist) here:</p>
  <input type="file" id="csvFile" accept=".csv">
  <div class="downloads" id="downloadLinks"></div>

<script>
document.getElementById('csvFileInput').addEventListener('change', function (e) {
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = function (e) {
    const text = e.target.result;
    const csv = parseCSV(text);
    const headers = csv[0].map(h => h.trim().replace(/\s+/g, '_'));
    const rows = csv.slice(1);

    const getField = (row, name) => {
      const idx = headers.indexOf(name.replace(/\s+/g, '_'));
      return idx >= 0 && row[idx] !== undefined ? row[idx] : '';
    };

    const artistMap = new Map();
    const albumMap = new Map();
    const genreMap = new Map();

    rows.forEach(row => {
      const artistStr = getField(row, "Artist_Name(s)");
      const albumName = getField(row, "Album_Name");
      const releaseDate = getField(row, "Release_Date");
      const recordLabel = getField(row, "Record_Label");
      const genresStr = getField(row, "Genres");

      const artists = artistStr ? artistStr.split(',').map(a => a.trim()) : [];
      const genres = genresStr ? genresStr.split(',').map(g => g.trim()) : [];

      artists.forEach(artist => {
        if (artist) artistMap.set(artist, true);
      });

      if (albumName) {
        const key = albumName;
        if (!albumMap.has(key)) {
          albumMap.set(key, {
            name: albumName,
            releaseDate: releaseDate || '',
            recordLabel: recordLabel || ''
          });
        }
      }

      genres.forEach(genre => {
        if (genre) genreMap.set(genre, true);
      });
    });

    // Display results
    const artistOutput = document.getElementById('artistOutput');
    const albumOutput = document.getElementById('albumOutput');
    const genreOutput = document.getElementById('genreOutput');

    artistOutput.innerHTML = '<tr><th>Name</th></tr>' +
      Array.from(artistMap.keys())
        .map(name => `<tr><td>${name}</td></tr>`)
        .join('');

    albumOutput.innerHTML = '<tr><th>Album_Name</th><th>Release_Date</th><th>Record_Label</th></tr>' +
      Array.from(albumMap.values())
        .map(album => `<tr><td>${album.name}</td><td>${album.releaseDate}</td><td>${album.recordLabel}</td></tr>`)
        .join('');

    genreOutput.innerHTML = '<tr><th>Genre</th></tr>' +
      Array.from(genreMap.keys())
        .map(genre => `<tr><td>${genre}</td></tr>`)
        .join('');
  };

  reader.readAsText(file);
});

// CSV parser that handles quoted fields, commas, and escaped quotes
function parseCSV(text) {
  const rows = [];
  let current = '';
  let insideQuotes = false;
  let row = [];

  for (let i = 0; i < text.length; i++) {
    const char = text[i];
    const nextChar = text[i + 1];

    if (char === '"') {
      if (insideQuotes && nextChar === '"') {
        current += '"';
        i++;
      } else {
        insideQuotes = !insideQuotes;
      }
    } else if (char === ',' && !insideQuotes) {
      row.push(current);
      current = '';
    } else if ((char === '\n' || char === '\r') && !insideQuotes) {
      if (char === '\r' && nextChar === '\n') i++;
      row.push(current);
      rows.push(row);
      row = [];
      current = '';
    } else {
      current += char;
    }
  }

  if (current.length > 0 || row.length > 0) {
    row.push(current);
    rows.push(row);
  }

  return rows.map(r => r.map(f => {
    f = f.trim();
    if (f.startsWith('"') && f.endsWith('"')) {
      f = f.slice(1, -1).replace(/""/g, '"');
    }
    return f;
  }));
}
</script>






  <hl/>

</body>
