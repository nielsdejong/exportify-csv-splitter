<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Spotify CSV Splitter</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 2em;
      background: #f9f9f9;
      color: #333;
    }
    h1 {
      font-size: 1.5em;
    }
    input[type="file"] {
      margin: 1em 0;
    }
    button {
      margin-top: 1em;
      padding: 0.5em 1em;
      cursor: pointer;
    }
    .downloads a {
      display: block;
      margin: 0.5em 0;
      text-decoration: none;
      color: #007acc;
    }
  </style>
</head>
<body>
  <h1>Upload and Split Spotify CSV</h1>
  <p>Step 1: Visit <a target="_blank" href="https://exportify.net/">Exportify</a> to export your songs. Next, upload your <code>liked_songs.csv</code> (or other playlist) here:</p>
  <input type="file" id="csvFile" accept=".csv">
  <div class="downloads" id="downloadLinks"></div>

  <script>
  function parseCSV(text) {
    const rows = [];
    const regex = /(".*?"|[^",\r\n]+)(?=\s*,|\s*$)/g;
    const lines = text.split(/\r?\n/);
    for (let line of lines) {
      const matches = [...line.matchAll(regex)].map(m => m[1].replace(/^"|"$/g, '').replace(/""/g, '"'));
      if (matches.length > 1) rows.push(matches);
    }
    return rows;
  }

  function createCSV(headers, rows) {
    const escaped = rows.map(r => r.map(f => `"${String(f).replace(/"/g, '""')}"`).join(','));
    return [headers.join(','), ...escaped].join('\n');
  }

  function downloadCSV(filename, csv) {
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.textContent = `Download ${filename}`;
    return a;
  }

  document.getElementById('csvFile').addEventListener('change', function () {
    const file = this.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function (e) {
      const csv = parseCSV(e.target.result);
      const rawHeaders = csv[0];
      const headers = rawHeaders.map(h => h.trim().replace(/\s+/g, '_'));
      const rows = csv.slice(1);

      const getIndex = (name) => headers.indexOf(name.replace(/\s+/g, '_'));
      const getField = (row, name) => row[getIndex(name)];

      const artists = [];
      const genres = [];
      const albums = [];
      const songs = [];

      for (const row of rows) {
        const trackURI = getField(row, "Track_URI");

        // Artists
        const artistList = getField(row, "Artist_Name(s)").split(',').map(a => a.trim());
        artistList.forEach(artist => artists.push([trackURI, artist]));

        // Genres
        const genreList = getField(row, "Genres").split(',').map(g => g.trim()).filter(g => g);
        genreList.forEach(genre => genres.push([trackURI, genre]));

        // Albums
        albums.push([
          trackURI,
          getField(row, "Release_Date"),
          getField(row, "Record_Label"),
          getField(row, "Album_Name")
        ]);

        // Songs
        songs.push([
          trackURI,
          getField(row, "Track_Name"),
          getField(row, "Duration_(ms)"),
          getField(row, "Popularity"),
          getField(row, "Danceability"),
          getField(row, "Energy"),
          getField(row, "Key"),
          getField(row, "Loudness"),
          getField(row, "Mode"),
          getField(row, "Speechiness"),
          getField(row, "Acousticness"),
          getField(row, "Instrumentalness"),
          getField(row, "Liveness"),
          getField(row, "Valence"),
          getField(row, "Tempo"),
          getField(row, "Time_Signature")
        ]);
      }

      const linksDiv = document.getElementById('downloadLinks');
      linksDiv.innerHTML = 'Step 2: Download your split files:';
      linksDiv.appendChild(downloadCSV('artists.csv', createCSV(["Track_URI", "Name"], artists)));
      linksDiv.appendChild(downloadCSV('genres.csv', createCSV(["Track_URI", "Genre"], genres)));
      linksDiv.appendChild(downloadCSV('albums.csv', createCSV(["Track_URI", "Release_Date", "Record_Label", "Name"], albums)));
      linksDiv.appendChild(downloadCSV('songs.csv', createCSV([
        "Track_URI", "Track_Name", "Duration_(ms)", "Popularity",
        "Danceability", "Energy", "Key", "Loudness", "Mode",
        "Speechiness", "Acousticness", "Instrumentalness", "Liveness",
        "Valence", "Tempo", "Time_Signature"
      ], songs)));

      const link = document.createElement('a');
      link.href = "https://console-preview.neo4j.io/tools/import";
      link.target = "_blank";
      link.textContent = "Visit the Neo4j Data Importer";
      linksDiv.appendChild(link);
    };
    reader.readAsText(file);
  });
</script>


  <hl/>
  <br/><br/>
  <i>This page uses client-side JavaScript to split your CSV file. Data is never uploaded to a server. Source code can be found on <a target="_blank" href='https://github.com/nielsdejong/exportify-csv-splitter'>Github</a>.</i>
</body>
</html>
